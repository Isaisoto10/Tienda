<table class="table">

    <thead>

        <tr>

            <th scope="col">#</th>

            <th scope="col">Nombre</th>

            <th scope="col">Precio</th>

            <th scope="col">Cantidad</th>

            <th scope="col">Subtotal</th>

            <th scope="col">Eliminar</th>

            

        </tr>

    </thead>

    <tbody>

        @for(p of carrito; track p.id){

        <tr>

            <th scope="row">

                {{p.id}}

            </th>

            <td>

                {{p.nombre}}

            </td>

            <td>

                ${{p.precio}}

            </td>

            <td>

                <button
                class="btn btn-primary"
                (click)="disminuirCantidad(p.id)">

                    -

                </button>

                {{p.cantidad}}

                <button
                class="btn btn-primary"
                (click)="aumentarCantidad(p.id)">

                    +

                </button>

            </td>

            <!-- PRECIO × CANTIDAD -->

            <td>

                ${{p.precio * p.cantidad}}

            </td>

            <td>

                <!-- Click ejecuta eliminarProducto -->

                <button
                class="btn btn-danger"
                (click)="eliminarProducto(p.id)">

                    Eliminar

                </button>

            </td>

        </tr>

        }

    </tbody>

</table>

<!-- TOTAL GENERAL DEL CARRITO -->

<div class="total-carrito">

    <h2>

        Total: ${{total}}

    </h2>

    <button class="btn btn-success">

        Finalizar Compra

    </button>

</div>
