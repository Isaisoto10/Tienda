<div class="contacto-wrapper my-5">
  <div class="container">
    <div class="row g-5">
      <div class="col-lg-5">
        <div class="info-contacto h-100 p-4 p-md-5">
          <h2 class="fw-bold mb-4">Ponte en contacto</h2>
          <p class="text-muted mb-5">
            ¿Tienes alguna duda sobre tu pedido o quieres hacernos una sugerencia? Estamos aquí para escucharte.
          </p>

          <div class="d-flex align-items-center mb-4">
            <div class="icon-box me-3">📍</div>
            <div>
              <h6 class="mb-0 fw-bold">Dirección</h6>
              <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3009.78456454499!2d-74.0059413!3d40.7127753!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c25a22a3bda30d%3A0xb89d1fe6bc499443!2sNew%20York%2C%20NY%2C%20EE.UU.!5e0!3m2!1ses!2s" width="100%" height="auto" frameborder="0"></iframe>
            </div>
          </div>

          <div class="d-flex align-items-center mb-4">
            <div class="icon-box me-3">📞</div>
            <div>
              <h6 class="mb-0 fw-bold">Teléfono</h6>
              <p class="mb-0 text-muted">+1 234 567 890</p>
            </div>
          </div>

          <div class="d-flex align-items-center mb-4">
            <div class="icon-box me-3">✉️</div>
            <div>
              <h6 class="mb-0 fw-bold">Email</h6>
              <p class="mb-0 text-muted">soporte@tutienda.com</p>
            </div>
          </div>

          <div class="social-links mt-5">
            <a href="#" class="me-3">FB</a>
            <a href="#" class="me-3">IG</a>
            <a href="#">TW</a>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="form-contacto bg-white shadow-lg p-4 p-md-5 rounded-4">
          <form class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Nombre</label>
              <input type="text" class="form-control" placeholder="Juan Pérez">
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="juan@ejemplo.com">
            </div>
            <div class="col-12">
              <label class="form-label">Asunto</label>
              <select class="form-select">
                <option selected>Consulta General</option>
                <option>Problema con mi pedido</option>
                <option>Sugerencia</option>
                <option>Otro</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Mensaje</label>
              <textarea class="form-control" rows="5" placeholder="¿En qué podemos ayudarte?"></textarea>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill">
                ENVIAR MENSAJE
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
