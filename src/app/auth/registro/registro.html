<form class="row g-3">
  <div class="col-md-6">
    <label for="inputName" class="form-label">Nombre</label>
    <input type="text" class="form-control" id="inputName" placeholder="Tu nombre">
  </div>
  <div class="col-md-6">
    <label for="inputLastName" class="form-label">Apellido</label>
    <input type="text" class="form-control" id="inputLastName" placeholder="Tu apellido">
  </div>

  <div class="col-12">
    <label for="inputEmail4" class="form-label">Correo Electrónico</label>
    <input type="email" class="form-control" id="inputEmail4" placeholder="ejemplo@correo.com">
  </div>

  <div class="col-md-6">
    <label for="inputPassword4" class="form-label">Contraseña</label>
    <input type="password" class="form-control" id="inputPassword4">
  </div>
  <div class="col-md-6">
    <label for="inputConfirmPassword" class="form-label">Confirmar Contraseña</label>
    <input type="password" class="form-control" id="inputConfirmPassword">
  </div>

  <div class="col-12">
    <label for="inputAddress" class="form-label">Dirección</label>
    <input type="text" class="form-control" id="inputAddress" placeholder="1234 Calle Principal">
  </div>

  <div class="col-md-6">
    <label for="inputCity" class="form-label">Ciudad</label>
    <input type="text" class="form-control" id="inputCity">
  </div>
  <div class="col-md-4">
    <label for="inputState" class="form-label">Estado/Provincia</label>
    <select id="inputState" class="form-select">
      <option selected>Elegir...</option>
      <option>Buenos Aires</option>
      <option>Córdoba</option>
      <option>Santa Fe</option>
    </select>
  </div>
  <div class="col-md-2">
    <label for="inputZip" class="form-label">Zip</label>
    <input type="text" class="form-control" id="inputZip">
  </div>

  <div class="col-12">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="gridCheck">
      <label class="form-check-label" for="gridCheck">
        Acepto los términos y condiciones
      </label>
    </div>
  </div>

  <div class="col-12">
    <button type="submit" class="btn btn-success">Crear Cuenta</button>
  </div>
</form>
